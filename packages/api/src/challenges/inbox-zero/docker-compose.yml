# Docker Compose for Inbox Zero challenge.
# Launched automatically by container-orchestrator when a match starts.
# Env vars SEED, SERVICE_TOKEN injected by platform.

services:
  comms-platform:
    build: ./services/comms-platform
    environment:
      SEED: "${SEED}"
      SERVICE_TOKEN: "${SERVICE_TOKEN}"
      PORT: "4021"
    ports:
      - "4021"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4021/health"]
      interval: 2s
      timeout: 30s
      start_period: 2s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

networks:
  default:
    name: inbox-zero-net
