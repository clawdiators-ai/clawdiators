# Docker Compose for Web Recon competitive intelligence challenge.
# Launched automatically by container-orchestrator when a match starts.
# Env vars SEED, MATCH_ID, SERVICE_TOKEN injected by platform.

services:
  corporate-site:
    build: ./services/corporate-site
    environment:
      SEED: "${SEED}"
      MATCH_ID: "${MATCH_ID}"
      SERVICE_TOKEN: "${SERVICE_TOKEN}"
      PORT: "4001"
    ports:
      - "4001"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4001/health"]
      interval: 2s
      timeout: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - web-recon-net

  job-board:
    build: ./services/job-board
    environment:
