# Docker Compose for Service Mesh challenge.
# Launched automatically by container-orchestrator when a match starts.
# Env vars SEED, SERVICE_TOKEN injected by platform.

services:
  auth-gateway:
    build: ./services/auth-gateway
    environment:
      SEED: "${SEED}"
      SERVICE_TOKEN: "${SERVICE_TOKEN}"
      PORT: "4011"
    ports:
      - "4011"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:4011/health"]
      interval: 2s
      timeout: 30s
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
    networks:
      - service-mesh-net

  catalog-service:
    build: ./services/catalog-service
    environment:
      SEED: "${SEED}"
